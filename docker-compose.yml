services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: devobservatory
      POSTGRES_USER: devobservatory
      POSTGRES_PASSWORD: devobservatory
    ports:
      - "5432:5432"
    volumes:
      - devobservatory_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: devobservatory
      RABBITMQ_DEFAULT_PASS: devobservatory
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: devobservatory
      MINIO_ROOT_PASSWORD: devobservatory
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - devobservatory_minio:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      POSTGRES_DSN: postgresql+psycopg://devobservatory:devobservatory@postgres:5432/devobservatory
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://devobservatory:devobservatory@rabbitmq:5672/
      JWT_SECRET_KEY: change-me
      CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: devobservatory
      S3_SECRET_ACCESS_KEY: devobservatory
      S3_BUCKET: devobservatory
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      POSTGRES_DSN: postgresql+psycopg://devobservatory:devobservatory@postgres:5432/devobservatory
      RABBITMQ_URL: amqp://devobservatory:devobservatory@rabbitmq:5672/
    depends_on:
      - postgres
      - rabbitmq

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      API_BASE_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  devobservatory_postgres:
  devobservatory_minio:
