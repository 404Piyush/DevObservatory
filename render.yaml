services:
  # --- BACKEND (FastAPI) ---
  - type: web
    name: devobservatory-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -U pip && pip install -r requirements.txt
    # Chaining migrations + server for Free Tier
    startCommand: export PYTHONPATH="$PWD" && alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: POSTGRES_DSN
        fromDatabase:
          name: devobservatory-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: devobservatory-redis
          type: keyvalue
          property: connectionString
      - key: RABBITMQ_URL
        sync: false # Set this manually in Render Dashboard from CloudAMQP
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "https://devobservatory.vercel.app" # Update to your actual Vercel URL

  # --- WORKER (Running as a Web Service to stay Free) ---
  - type: web
    name: devobservatory-worker
    runtime: python
    plan: free
    region: oregon
    rootDir: worker
    buildCommand: pip install -U pip && pip install -r requirements.txt
    startCommand: python worker.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: POSTGRES_DSN
        fromDatabase:
          name: devobservatory-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false # Set this manually in Render Dashboard

  # --- REDIS ---
  - type: keyvalue
    name: devobservatory-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  # --- POSTGRES ---
  - name: devobservatory-db
    plan: free
    region: oregon
